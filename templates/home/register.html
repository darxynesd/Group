{% extends 'base.html' %}

{% block title %}Реєстрація - Портал групи{% endblock %}

{% block content %}
<div class="register-page widget">
    <h1>Реєстрація</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
            <p>
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {{ field.errors }}
            </p>
        {% endfor %}
        <button type="submit">Створити акаунт</button>
    </form>
    <p>Вже зареєстровані? <a href="{% url 'accounts:login' %}">Увійти</a></p>
</div>
{% endblock %}
